<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора | Жанерке Скакова</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --anthracite: #0a0a0a;
            --anthracite-light: #141414;
            --anthracite-card: #1c1c1c;
            --white: #ffffff;
            --text-gray: #a0a0a0;
            --gold: #d4af37;
            --gold-hover: #f3cf58;
            --emerald: #0b4d42;
            --emerald-light: #107c6c;
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--anthracite);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav header */
        .admin-header {
            background-color: var(--anthracite-light);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--white);
        }

        .logo-area img {
            height: 40px;
        }

        .logo-area span {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .admin-title-badge {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Admin Tabs Navigation */
        .admin-tabs {
            display: flex;
            background: var(--anthracite-light);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 40px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 20px 24px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--white);
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        /* Container & Views */
        .admin-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .view-pane {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .view-pane.active {
            display: block;
        }

        /* Dynamic Grids / Tables */
        .admin-table-card {
            background: var(--anthracite-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-top: 20px;
        }

        .table-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        .table-header-row h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.02);
            color: var(--text-gray);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 16px 30px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
            color: var(--white);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.01);
        }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-active { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .badge-suspended { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        .badge-paid { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .badge-pending { background: rgba(241, 196, 15, 0.15); color: #f1c40f; }
        .badge-failed { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }

        /* Course Builder Layout */
        .builder-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
            align-items: start;
        }

        .courses-sidebar {
            background: var(--anthracite-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .courses-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .course-nav-item {
            padding: 14px 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-nav-item:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.03);
        }

        .course-nav-item.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
            font-weight: 500;
        }

        .workspace-card {
            background: var(--anthracite-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        /* Modules & Lessons Workspace */
        .modules-builder-section {
            border-top: 1px solid var(--glass-border);
            padding-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .builder-module-card {
            background: var(--anthracite-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .builder-module-header {
            padding: 16px 24px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .builder-module-header h4 {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .builder-lessons-list {
            list-style: none;
            padding: 15px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .builder-lesson-item {
            background: var(--anthracite-light);
            border: 1px solid var(--glass-border);
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lesson-info-text {
            font-size: 0.9rem;
        }

        .lesson-info-url {
            color: var(--text-gray);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .builder-actions-cell {
            display: flex;
            gap: 10px;
        }

        /* Common Elements */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--gold);
            color: var(--anthracite);
        }

        .btn-primary:hover {
            background-color: var(--gold-hover);
        }

        .btn-danger {
            background-color: #e74c3c;
            color: var(--white);
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-outline {
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--white);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--white);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .btn-link {
            background: transparent;
            border: none;
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
        }

        .btn-link:hover {
            color: var(--white);
        }

        /* Inputs */
        input, textarea, select {
            width: 100%;
            background: var(--anthracite-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: var(--transition);
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--gold);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        /* Overlay Modals */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-body {
            background: var(--anthracite-light);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-close-btn:hover {
            color: var(--gold);
        }

        .modal-body h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Light Theme overrides */
        body.light-theme {
            background-color: #f4f4f6;
            color: #1a1a1a;
        }
        body.light-theme .admin-header {
            background-color: #ffffff;
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme .admin-header .logo-area,
        body.light-theme .admin-header span,
        body.light-theme .header-actions {
            color: #1a1a1a;
        }
        body.light-theme .admin-tabs {
            background-color: #ffffff;
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme .tab-btn {
            color: #555555;
        }
        body.light-theme .tab-btn:hover {
            color: #1a1a1a;
        }
        body.light-theme .tab-btn.active {
            color: var(--emerald-light);
            border-bottom-color: var(--emerald-light);
        }
        body.light-theme .courses-sidebar, 
        body.light-theme .workspace-card, 
        body.light-theme .admin-table-card {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        body.light-theme .course-nav-item {
            background: #f8f8fa;
            border-color: rgba(0, 0, 0, 0.05);
            color: #333333;
        }
        body.light-theme .course-nav-item:hover {
            border-color: var(--emerald-light);
            background: rgba(16, 124, 108, 0.03);
        }
        body.light-theme .course-nav-item.active {
            border-color: var(--emerald-light);
            background: rgba(16, 124, 108, 0.06);
            color: #1a1a1a;
        }
        body.light-theme input, 
        body.light-theme textarea, 
        body.light-theme select {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.12);
            color: #1a1a1a;
        }
        body.light-theme input:focus, 
        body.light-theme textarea:focus, 
        body.light-theme select:focus {
            border-color: var(--emerald-light);
        }
        body.light-theme .form-group label {
            color: #555555;
        }
        body.light-theme th {
            background: rgba(0,0,0,0.02);
            color: #555555;
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme td {
            border-bottom-color: rgba(0, 0, 0, 0.06);
            color: #222222;
        }
        body.light-theme tr:hover td {
            background: rgba(0,0,0,0.01);
        }
        body.light-theme .builder-module-card {
            background: #fdfdfd;
            border-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme .builder-module-header {
            background: rgba(0,0,0,0.01);
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme .builder-module-header h4 {
            color: var(--emerald-light);
        }
        body.light-theme .builder-lesson-item {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme .lesson-info-url {
            color: #666666;
        }
        body.light-theme .admin-modal {
            background: rgba(0, 0, 0, 0.4);
        }
        body.light-theme .modal-body {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            color: #1a1a1a;
        }
        body.light-theme .modal-body h3 {
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }
        body.light-theme .modal-body label {
            color: #555555;
        }
        body.light-theme .modal-body p {
            color: #444444;
        }
        body.light-theme .btn-outline {
            border-color: rgba(0, 0, 0, 0.12);
            color: #555555;
        }
        body.light-theme .btn-outline:hover {
            background: rgba(0,0,0,0.03);
            color: #1a1a1a;
            border-color: #999999;
        }
        body.light-theme .btn-link {
            color: var(--emerald-light);
        }
        body.light-theme .btn-link:hover {
            color: #0c5a4e;
        }
        body.light-theme .admin-title-badge {
            background: rgba(16, 124, 108, 0.1);
            color: var(--emerald-light);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="admin-header">
        <a href="/" class="logo-area">
            <img src="Лого и картинки /logo.png" alt="Логотип">
            <span>Жанерке Скакова</span>
            <span class="admin-title-badge">Панель управления</span>
        </a>
        <div class="header-actions" style="display: flex; align-items: center; gap: 15px;">
            <span><i class="fa-solid fa-user-shield" style="color:var(--gold); margin-right:6px;"></i> <strong id="admin-name-lbl">Администратор</strong></span>
            <button class="btn btn-outline btn-sm" id="theme-toggle-btn" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 4px;"><i class="fa-solid fa-sun"></i> Светлая тема</button>
            <button class="btn btn-outline btn-sm" id="admin-logout-btn"><i class="fa-solid fa-sign-out-alt"></i> Выйти</button>
        </div>
    </header>

    <!-- Tabs Nav -->
    <nav class="admin-tabs">
        <button class="tab-btn active" data-view="courses-view"><i class="fa-solid fa-graduation-cap"></i> Управление курсами</button>
        <button class="tab-btn" data-view="students-view"><i class="fa-solid fa-users"></i> Ученики</button>
        <button class="tab-btn" data-view="payments-view"><i class="fa-solid fa-receipt"></i> Лог оплат (Kaspi)</button>
    </nav>

    <!-- Content -->
    <main class="admin-content">

        <!-- 1. VIEW: COURSES BUILDER -->
        <div class="view-pane active" id="courses-view">
            <div class="builder-grid">
                
                <!-- Courses Sidebar List -->
                <div class="courses-sidebar">
                    <button class="btn btn-primary" id="btn-create-course"><i class="fa-solid fa-plus"></i> Создать курс</button>
                    <ul class="courses-list" id="courses-list-element">
                        <!-- Dynamic courses list -->
                    </ul>
                </div>

                <!-- Course Workspace (selected course detail) -->
                <div id="course-workspace-area">
                    <div style="padding:40px; text-align:center; color:var(--text-gray);">
                        <i class="fa-solid fa-hand-pointer" style="font-size:3rem; margin-bottom:15px; color:var(--gold);"></i>
                        <h3>Выберите курс в меню слева для его настройки</h3>
                    </div>
                </div>

            </div>
        </div>

        <!-- 2. VIEW: STUDENTS LIST -->
        <div class="view-pane" id="students-view">
            <div class="admin-table-card">
                <div class="table-header-row">
                    <h3>Список учеников</h3>
                    <button class="btn btn-primary btn-sm" id="btn-add-student-modal"><i class="fa-solid fa-user-plus"></i> Добавить вручную</button>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Имя</th>
                                <th>Email</th>
                                <th>Статус</th>
                                <th>Роль</th>
                                <th>Кол-во доступов</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body">
                            <!-- Dynamic student rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 3. VIEW: PAYMENTS TRANSACTION MONITOR -->
        <div class="view-pane" id="payments-view">
            <div class="admin-table-card">
                <div class="table-header-row">
                    <h3>Транзакции Kaspi Pay</h3>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Транзакция ID</th>
                                <th>Имя</th>
                                <th>Email</th>
                                <th>Курс</th>
                                <th>Сумма (₸)</th>
                                <th>Статус</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody id="payments-table-body">
                            <!-- Dynamic payment logs -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <!-- ADMIN MODALS OVERLAYS -->
    <div id="admin-modal-overlay" class="admin-modal" style="display: none;">
        <div class="modal-body" id="admin-modal-content">
            <!-- Modal form goes here dynamically -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let courses = [];
            let students = [];
            let payments = [];
            let selectedCourse = null;

            const modalOverlay = document.getElementById('admin-modal-overlay');
            const modalContent = document.getElementById('admin-modal-content');

            // Theme Switch Logic
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            
            function applyTheme(theme) {
                if (theme === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i> Темная тема';
                } else {
                    document.body.classList.remove('light-theme');
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i> Светлая тема';
                }
            }

            const savedTheme = localStorage.getItem('admin-theme') || 'dark';
            applyTheme(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                localStorage.setItem('admin-theme', newTheme);
                applyTheme(newTheme);
            });
            
            // Tab Switch logic
            const tabButtons = document.querySelectorAll('.tab-btn');
            const viewPanes = document.querySelectorAll('.view-pane');

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabButtons.forEach(b => b.classList.remove('active'));
                    viewPanes.forEach(v => v.classList.remove('active'));

                    btn.classList.add('active');
                    const targetView = btn.getAttribute('data-view');
                    document.getElementById(targetView).classList.add('active');

                    // Trigger view load
                    if (targetView === 'courses-view') {
                        loadCourses();
                    } else if (targetView === 'students-view') {
                        loadStudents();
                    } else if (targetView === 'payments-view') {
                        loadPayments();
                    }
                });
            });

            // Verification of Session
            async function verifySession() {
                try {
                    const res = await fetch('/api/auth/me');
                    const data = await res.json();
                    if (!res.ok || !data.user || data.user.role !== 'admin') {
                        window.location.href = '/admin_login.html';
                        return;
                    }
                    document.getElementById('admin-name-lbl').textContent = data.user.name;
                    loadCourses(); // initial load default tab
                } catch (e) {
                    window.location.href = '/admin_login.html';
                }
            }

                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--text-gray);">Ученики не найдены.</td></tr>';
                    return;
                }

                students.forEach(st => {
                    const statusText = st.status === 'active' ? 'Активен' : 'Заблокирован';
                    const statusBadge = st.status === 'active' ? 'badge-active' : 'badge-suspended';
                    const statusBtnText = st.status === 'active' ? 'Заблокировать' : 'Разблокировать';
                    const statusBtnClass = st.status === 'active' ? 'btn-danger' : 'btn-primary';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${st.name}</strong></td>
                        <td>${st.email}</td>
                        <td><span class="badge ${statusBadge}">${statusText}</span></td>
                        <td>${st.role === 'admin' ? 'Админ' : 'Ученик'}</td>

                    try {
                        const res = await fetch('/api/admin/students', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name, email, password, role })
                        });
                        if (res.ok) {
                            closeAdminModal();
                            loadStudents();
                        } else {
                            const err = await res.json();
                            alert('Ошибка: ' + err.error);
                        }
                    } catch (err) {
                        alert('Не удалось зарегистрировать ученика.');
                    }
                });
            });


            // --- 3. PAYMENTS MONITOR MODULE ---

            async function loadPayments() {
                try {
                    const res = await fetch('/api/admin/payments');
                    payments = await res.json();
                    renderPaymentsTable();
                } catch (err) {
                    console.error('Error fetching payments:', err);
                }
            }

            function renderPaymentsTable() {
                const tbody = document.getElementById('payments-table-body');
                tbody.innerHTML = '';

                if (payments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--text-gray);">Логи оплат пусты.</td></tr>';
                    return;
                }

                payments.forEach(p => {
                    const dateObj = new Date(p.created_at.replace(' ', 'T'));
                    const statusText = p.status === 'paid' ? 'Успешно' : p.status === 'pending' ? 'В ожидании' : 'Ошибка';
                    const statusBadge = p.status === 'paid' ? 'badge-paid' : p.status === 'pending' ? 'badge-pending' : 'badge-failed';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><code>${p.kaspi_tx_id}</code></td>
                        <td>${p.user_name}</td>
                        <td>${p.user_email}</td>
                        <td>${p.course_title}</td>
                        <td><strong>${p.amount.toLocaleString()} ₸</strong></td>
                        <td><span class="badge ${statusBadge}">${statusText}</span></td>
                        <td style="font-size:0.85rem; color:var(--text-gray);">${dateObj.toLocaleString('ru-RU')}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // Initialize app
            verifySession();
            // Prefetch courses for other selects
            fetch('/api/admin/courses').then(r => r.json()).then(data => courses = data);
        });
    </script>
</body>
</html>
