<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля | Жанерке Скакова LMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--anthracite);
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .reset-card {
            background: var(--anthracite-light, #171d1c);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .reset-logo {
            max-height: 60px;
            margin-bottom: 20px;
        }
        .reset-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .reset-subtitle {
            color: var(--text-gray, #a0a5a5);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-gray, #a0a5a5);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--gold, #c5a880);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-error {
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
        .form-success {
            color: var(--emerald-light, #2ecc71);
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
        .btn-submit {
            background-color: var(--emerald, #0b4d42);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(11, 77, 66, 0.3);
        }
        .btn-submit:hover {
            background-color: var(--emerald-light, #0e5e51);
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--gold, #c5a880);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s ease;
        }
        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <img src="Лого и картинки /logo.png" alt="Logo" class="reset-logo">
        <h1 class="reset-title">Новый пароль</h1>
        <p class="reset-subtitle">Пожалуйста, введите ваш новый пароль для восстановления доступа к кабинету.</p>

        <form id="reset-form">
            <div class="form-group">
                <label for="new-password">Новый пароль</label>
                <input type="password" id="new-password" required minlength="6" placeholder="Минимум 6 символов">
            </div>
            <div class="form-group">
                <label for="confirm-password">Подтвердите пароль</label>
                <input type="password" id="confirm-password" required minlength="6" placeholder="Повторите пароль">
            </div>
            <div class="form-error" id="reset-error"></div>
            <div class="form-success" id="reset-success"></div>
            <button type="submit" class="btn-submit" id="submit-btn">Сохранить пароль</button>
        </form>

        <a href="/" class="back-link">На главную страницу</a>
    </div>

    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('reset-success');
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submit-btn');

            errorDiv.textContent = '';
            successDiv.textContent = '';

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Пароли не совпадают.';
                return;
            }

            // Get token from URL query params
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                errorDiv.textContent = 'Токен сброса пароля отсутствует или недействителен.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Сохранение...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: newPassword })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Не удалось сбросить пароль');
                }

                successDiv.textContent = 'Пароль успешно изменен! Вы можете войти с новым паролем в личном кабинете.';
                document.getElementById('reset-form').style.display = 'none';
            } catch (err) {
                errorDiv.textContent = err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Сохранить пароль';
            }
        });
    </script>
</body>
</html>
